name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r solar/requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile key Python modules
        run: |
          PYTHONPYCACHEPREFIX=/tmp/solar_pred_pycache python -m py_compile \
            solar/app.py \
            solar/data_sources/eia_open_data.py \
            solar/train_eia_backtest.py \
            solar/grid_backtest.py \
            tests/test_api_contract.py \
            tests/test_eia_data_source.py \
            tests/test_storage_dispatch.py \
            tests/test_time_split_evaluation.py
