<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIA 真实电网数据回测平台</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --text: #172033;
            --muted: #627086;
            --line: #d8e0ea;
            --accent: #1769aa;
            --accent-2: #0f8b8d;
            --warn: #a35f00;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            border-bottom: 1px solid var(--line);
            background: var(--surface);
        }

        .topbar {
            max-width: 1180px;
            margin: 0 auto;
            padding: 22px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .lang {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
        }

        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .metric {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            min-height: 82px;
        }

        .metric-label {
            color: var(--muted);
            font-size: 12px;
        }

        .metric-value {
            margin-top: 8px;
            font-size: 20px;
            font-weight: 700;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .cases {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .case {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 16px;
            background: #fbfcfe;
        }

        .case h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 8px 6px;
            text-align: left;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        button.secondary {
            background: var(--surface);
            color: var(--accent);
        }

        .notice {
            border-left: 4px solid var(--warn);
            background: #fff7e8;
            color: #5f3b00;
            padding: 12px;
            border-radius: 6px;
        }

        .chart {
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
        }

        .chart img {
            max-width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        @media (max-width: 900px) {
            .status-grid,
            .cases {
                grid-template-columns: 1fr;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="topbar">
            <div>
                <h1 data-i18n="title">EIA 真实电网数据回测平台</h1>
                <p class="subtitle" data-i18n="subtitle">使用 EIA Open Data 小时级真实电网数据，按时间顺序验证负荷、太阳能、风电和净负荷预测。</p>
            </div>
            <button id="languageToggle" class="lang" type="button">EN</button>
        </div>
    </header>

    <main>
        <section class="status-grid" id="statusGrid"></section>

        <section class="panel">
            <h2 data-i18n="backtestTitle">多年时间切分回测</h2>
            <div id="caseList" class="cases"></div>
        </section>

        <section class="panel">
            <h2 data-i18n="chartTitle">预测曲线</h2>
            <div id="chartArea" class="chart" data-i18n="chartPlaceholder">选择一个目标查看真实值与预测值。</div>
        </section>
    </main>

    <script>
        const translations = {
            zh: {
                title: 'EIA 真实电网数据回测平台',
                subtitle: '使用 EIA Open Data 小时级真实电网数据，按时间顺序验证负荷、太阳能、风电和净负荷预测。',
                backtestTitle: '多年时间切分回测',
                chartTitle: '预测曲线',
                chartPlaceholder: '选择一个目标查看真实值与预测值。',
                source: '数据源',
                scenario: '实验',
                train: '训练窗口',
                evaluation: '验证窗口',
                rows: '样本行数',
                status: '状态',
                available: '已生成',
                unavailable: '等待数据生成',
                target: '目标',
                modelMape: '模型 MAPE',
                previousDayMape: '昨日同小时 MAPE',
                previousWeekMape: '上周同小时 MAPE',
                eiaForecastMape: 'EIA预测 MAPE',
                load: '负荷',
                solar: '太阳能',
                wind: '风电',
                netLoad: '净负荷',
                loading: '正在加载...',
                failed: '加载失败',
                noData: '当前还没有生成 EIA 回测文件。',
            },
            en: {
                title: 'EIA Real Grid Backtesting Dashboard',
                subtitle: 'Chronological backtests for load, solar, wind, and net load using hourly EIA Open Data.',
                backtestTitle: 'Multi-Year Time-Split Backtests',
                chartTitle: 'Prediction Curves',
                chartPlaceholder: 'Choose a target to compare actual and predicted values.',
                source: 'Source',
                scenario: 'Scenario',
                train: 'Training Window',
                evaluation: 'Evaluation Window',
                rows: 'Rows',
                status: 'Status',
                available: 'Generated',
                unavailable: 'Waiting for data',
                target: 'Target',
                modelMape: 'Model MAPE',
                previousDayMape: 'Previous-Day MAPE',
                previousWeekMape: 'Previous-Week MAPE',
                eiaForecastMape: 'EIA Forecast MAPE',
                load: 'Load',
                solar: 'Solar',
                wind: 'Wind',
                netLoad: 'Net Load',
                loading: 'Loading...',
                failed: 'Failed to load',
                noData: 'No EIA backtest files have been generated yet.',
            },
        };

        let lang = localStorage.getItem('dashboardLanguage') || 'zh';
        let latestData = null;

        function t(key) {
            return translations[lang][key] || translations.zh[key] || key;
        }

        function applyTranslations() {
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.title = t('title');
            document.querySelectorAll('[data-i18n]').forEach(element => {
                element.textContent = t(element.dataset.i18n);
            });
            document.getElementById('languageToggle').textContent = lang === 'zh' ? 'EN' : '中文';
            if (latestData) {
                renderDashboard(latestData);
            }
        }

        function metricValue(value, suffix = '') {
            if (value === null || value === undefined || Number.isNaN(Number(value))) {
                return '-';
            }
            return `${Number(value).toFixed(2)}${suffix}`;
        }

        function targetRows(targets) {
            const rows = [
                [t('load'), targets?.load],
                [t('solar'), targets?.solar],
                [`${t('solar')} > 100 MW`, {
                    model: targets?.solar?.active_generation_model,
                    previous_day_baseline: targets?.solar?.active_generation_previous_day_baseline,
                    previous_week_baseline: targets?.solar?.active_generation_previous_week_baseline,
                }],
                [t('wind'), targets?.wind],
                [t('netLoad'), targets?.net_load],
            ];
            return rows.map(([label, item]) => `
                <tr>
                    <td>${label}</td>
                    <td>${metricValue(item?.model?.mape_percent, '%')}</td>
                    <td>${metricValue(item?.previous_day_baseline?.mape_percent, '%')}</td>
                    <td>${metricValue(item?.previous_week_baseline?.mape_percent, '%')}</td>
                    <td>${metricValue(item?.day_ahead_baseline?.mape_percent, '%')}</td>
                </tr>
            `).join('');
        }

        function renderStatus(data) {
            const generated = data.cases.filter(item => item.available).length;
            document.getElementById('statusGrid').innerHTML = `
                <div class="metric">
                    <div class="metric-label">${t('source')}</div>
                    <div class="metric-value">EIA</div>
                </div>
                <div class="metric">
                    <div class="metric-label">${t('scenario')}</div>
                    <div class="metric-value">2021-2026</div>
                </div>
                <div class="metric">
                    <div class="metric-label">${t('status')}</div>
                    <div class="metric-value">${generated}/${data.cases.length}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">${t('target')}</div>
                    <div class="metric-value">MW</div>
                </div>
            `;
        }

        function renderCase(caseItem) {
            const title = lang === 'zh' ? caseItem.title_zh : caseItem.title;
            if (!caseItem.available) {
                return `
                    <div class="case">
                        <h3>${title}</h3>
                        <div class="meta">
                            <div><strong>${t('train')}:</strong> ${caseItem.training_window || '-'}</div>
                            <div><strong>${t('evaluation')}:</strong> ${caseItem.evaluation_window || '-'}</div>
                        </div>
                        <div class="notice">${t('noData')}</div>
                    </div>
                `;
            }

            const rows = caseItem.predictions?.rows || caseItem.dataset?.rows || '-';
            return `
                <div class="case">
                    <h3>${title}</h3>
                    <div class="meta">
                        <div><strong>${t('train')}:</strong> ${caseItem.training_window}</div>
                        <div><strong>${t('evaluation')}:</strong> ${caseItem.evaluation_window}</div>
                        <div><strong>${t('rows')}:</strong> ${rows}</div>
                        <div><strong>${t('status')}:</strong> ${t('available')}</div>
                    </div>
                    <table>
                        <tr>
                            <th>${t('target')}</th>
                            <th>${t('modelMape')}</th>
                            <th>${t('previousDayMape')}</th>
                            <th>${t('previousWeekMape')}</th>
                            <th>${t('eiaForecastMape')}</th>
                        </tr>
                        ${targetRows(caseItem.targets)}
                    </table>
                    <div class="actions">
                        <button type="button" onclick="showPlot('${caseItem.id}', 'load')">${t('load')}</button>
                        <button type="button" onclick="showPlot('${caseItem.id}', 'solar')">${t('solar')}</button>
                        <button type="button" onclick="showPlot('${caseItem.id}', 'wind')">${t('wind')}</button>
                        <button type="button" onclick="showPlot('${caseItem.id}', 'net_load')">${t('netLoad')}</button>
                    </div>
                </div>
            `;
        }

        function renderDashboard(data) {
            latestData = data;
            renderStatus(data);
            document.getElementById('caseList').innerHTML = data.cases.map(renderCase).join('');
        }

        async function loadDashboard() {
            const caseList = document.getElementById('caseList');
            caseList.innerHTML = `<div class="notice">${t('loading')}</div>`;
            try {
                const response = await fetch('/eia/backtests');
                const data = await response.json();
                if (!response.ok || !data.cases) {
                    throw new Error(data.detail || t('failed'));
                }
                renderDashboard(data);
            } catch (error) {
                caseList.innerHTML = `<div class="notice">${t('failed')}: ${error.message}</div>`;
            }
        }

        window.showPlot = async function (period, target) {
            const chartArea = document.getElementById('chartArea');
            chartArea.textContent = t('loading');
            try {
                const response = await fetch(`/plot/eia_backtest?period=${encodeURIComponent(period)}&target=${encodeURIComponent(target)}`);
                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || t('failed'));
                }
                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                chartArea.innerHTML = '';
                const image = document.createElement('img');
                image.src = imageUrl;
                image.alt = t('chartTitle');
                chartArea.appendChild(image);
            } catch (error) {
                chartArea.innerHTML = `<div class="notice">${t('failed')}: ${error.message}</div>`;
            }
        };

        document.getElementById('languageToggle').addEventListener('click', () => {
            lang = lang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('dashboardLanguage', lang);
            applyTranslations();
        });

        applyTranslations();
        loadDashboard();
    </script>
</body>

</html>
